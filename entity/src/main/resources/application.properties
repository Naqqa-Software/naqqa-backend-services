spring.application.name=${APP_NAME}
server.port=${SERVER_PORT}

# Load local .env if present
spring.config.import=optional:file:.env[.properties]

# ========================
# = App (required by naqqa-auth)
# ========================
app.url=${APP_URL}
app.platform-name=${APP_PLATFORM_NAME}
app.email.primary-color=${APP_EMAIL_PRIMARY_COLOR}

# ========================
# = Database
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}

# ========================
# = JWT / RSA Keys
# ========================
rsa.private-key=${RSA_PRIVATE_KEY}
rsa.public-key=${RSA_PUBLIC_KEY}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.expiration-remember=${JWT_EXPIRATION_REMEMBER}

# ========================
# = Redis
# ========================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# ========================
# = Admin User Seed
# ========================
user.config.email=${ADMIN_EMAIL}
user.config.password=${ADMIN_PASSWORD}
user.config.phone=${ADMIN_PHONE}

# ========================
# = MongoDB
# ========================
spring.data.mongodb.host=${MONGO_HOST}
spring.data.mongodb.port=${MONGO_PORT}
spring.data.mongodb.database=${MONGO_DB}
spring.data.mongodb.auto-index-creation=${MONGO_AUTO_INDEX}

# ========================
# = SendGrid (required by naqqa-auth)
# ========================
spring.sendgrid.api-key=${SENDGRID_API_KEY}
spring.sendgrid.from-email=${SENDGRID_FROM_EMAIL}
